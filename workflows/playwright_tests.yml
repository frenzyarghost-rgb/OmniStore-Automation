name: OmniStore Regression Suite
on: [push, pull_request] # Run on every code change

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest # Use a Linux server in the cloud

    steps:
    - uses: actions/checkout@v4 # Get your code

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure Playwright Browsers are installed
      run: playwright install --with-deps

    - name: Run Playwright Tests
      run: python -m pytest tests/ --alluredir=allure-results
      # This runs all your UI, API, and Hybrid tests!

    - name: Upload Allure Results
      if: always() # Upload even if tests fail
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results