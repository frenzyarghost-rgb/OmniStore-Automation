name: OmniStore Regression Suite
on: [push, pull_request] # Run on every code change

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest # Use a Linux server in the cloud

    steps:
    - uses: actions/checkout@v4 # Get your code

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure Playwright Browsers are installed
      run: playwright install --with-deps

    - name: Run Playwright Tests
      run: python -m pytest tests/ --alluredir=allure-results
      # This runs all your UI, API, and Hybrid tests!

    - name: Get Allure history
    - uses: actions/checkout@v4
    - if: always()
    - continue-on-error: true
    - with:
    - ref: gh-pages
    - path: gh-pages

    - name: Generate Allure Report
    - uses: simple-elf/allure-report-action@master
    - if: always()
    - with:
    - allure_results: allure-results
    - allure_history: allure-history
    - keep_reports: 20

    - name: Deploy report to Github Pages
    - if: always()
    - uses: peaceiris/actions-gh-pages@v3
    - with:
    - github_token: ${{ secrets.GITHUB_TOKEN }}
    - publish_dir: allure-history